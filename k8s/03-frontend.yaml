apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloud-web-k8s
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloud-web-k8s
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/metrics
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: frontend
          image: local/cloud-web-frontend:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: API_INTERNAL_URL
              value: http://api:8081
            - name: NEXT_PUBLIC_API_URL
              value: http://localhost:8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5

